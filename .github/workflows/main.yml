name: Daily Fair Update

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # NEW STEP: Playwright needs an actual browser binary installed
      # on the runner (it doesn't use your normal Chrome/Firefox).
      # --with-deps also installs the system libraries Chromium needs
      # to run on a bare Ubuntu machine.
      - name: Install Playwright browser
        run: playwright install --with-deps chromium

      - name: Run scraper
        run: python scraper.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/fairs.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update fair data $(date -u +'%Y-%m-%d')" && git push)
