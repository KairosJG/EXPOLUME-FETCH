<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>China Fair Radar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0D0D0D;
    --panel: #1A1A1A;
    --panel-alt: #212121;
    --hairline: #2E2E2E;
    --yellow: #F5C518;
    --yellow-dim: #C9A315;
    --maroon: #6B1F1F;
    --text: #F2F2F0;
    --text-dim: #9A9A98;
    --text-faint: #6B6B69;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  a { color: inherit; }

  .wrap {
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* ---- Header ---- */
  .header {
    display: flex;
    align-items: flex-end;
    gap: 28px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--hairline);
    padding-bottom: 28px;
    margin-bottom: 32px;
  }

  .month-tile {
    position: relative;
    line-height: 0.85;
  }

  .month-tile .num {
    font-family: 'Archivo Black', sans-serif;
    font-size: 84px;
    color: var(--yellow);
    letter-spacing: -2px;
  }

  .month-tile .rule {
    height: 4px;
    width: 64px;
    background: var(--maroon);
    margin-top: 10px;
  }

  .header-text { flex: 1; min-width: 240px; }

  .eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin: 0 0 6px;
  }

  h1 {
    font-family: 'Archivo Black', sans-serif;
    font-size: 28px;
    margin: 0 0 8px;
    letter-spacing: -0.5px;
  }

  .updated {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text-faint);
  }

  /* ---- Summary strip ---- */
  .summary {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--hairline);
    border: 1px solid var(--hairline);
    margin-bottom: 32px;
  }

  .stat {
    background: var(--panel);
    padding: 18px 20px;
  }

  .stat .n {
    font-family: 'Archivo Black', sans-serif;
    font-size: 32px;
    color: var(--text);
  }

  .stat.go .n { color: var(--yellow); }

  .stat .l {
    font-size: 12px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 4px;
  }

  /* ---- Table ---- */
  .table-head {
    display: grid;
    grid-template-columns: 2fr 1.3fr 1.5fr 1fr;
    gap: 16px;
    padding: 0 20px 12px;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-faint);
    border-bottom: 1px solid var(--hairline);
  }

  .row {
    display: grid;
    grid-template-columns: 2fr 1.3fr 1.5fr 1fr;
    gap: 16px;
    padding: 18px 20px;
    border-bottom: 1px solid var(--hairline);
    align-items: center;
    transition: background 0.15s ease;
  }

  .row:hover { background: var(--panel); }

  .fair-name {
    font-weight: 600;
    font-size: 15px;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .fair-name:hover { color: var(--yellow); }

  .fair-name .arrow {
    font-size: 13px;
    color: var(--text-faint);
  }

  .dates, .venue {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    color: var(--text-dim);
  }

  .venue { font-family: 'Inter', sans-serif; }

  .badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    padding: 5px 10px;
    border-radius: 2px;
    white-space: nowrap;
  }

  .badge.go { background: var(--yellow); color: #14140E; }
  .badge.skip { background: transparent; border: 1px solid var(--maroon); color: #C77; }
  .badge.maybe { background: transparent; border: 1px solid var(--hairline); color: var(--text-dim); }
  .badge.pending { background: var(--panel-alt); color: var(--text-faint); }

  .note {
    font-size: 12px;
    color: var(--text-faint);
    margin-top: 4px;
  }

  .empty, .loading {
    padding: 60px 20px;
    text-align: center;
    color: var(--text-faint);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
  }

  footer {
    margin-top: 40px;
    font-size: 12px;
    color: var(--text-faint);
    font-family: 'IBM Plex Mono', monospace;
  }

  /* ---- Mobile ---- */
  @media (max-width: 720px) {
    .month-tile .num { font-size: 60px; }
    .summary { grid-template-columns: repeat(2, 1fr); }
    .table-head { display: none; }
    .row {
      grid-template-columns: 1fr;
      gap: 6px;
      padding: 16px 4px;
    }
    .row .dates::before { content: "Dates: "; color: var(--text-faint); }
    .row .venue::before { content: "Venue: "; color: var(--text-faint); }
  }

  :focus-visible {
    outline: 2px solid var(--yellow);
    outline-offset: 2px;
  }
</style>
</head>
<body>
  <div class="wrap">

    <div class="header">
      <div class="month-tile">
        <div class="num" id="monthNum">--</div>
        <div class="rule"></div>
      </div>
      <div class="header-text">
        <p class="eyebrow">12P &middot; China Trade Fair Radar</p>
        <h1 id="monthTitle">Loading month&hellip;</h1>
        <p class="updated" id="updatedAt">Checking last update&hellip;</p>
      </div>
    </div>

    <div class="summary" id="summary">
      <div class="stat"><div class="n">&mdash;</div><div class="l">Found</div></div>
      <div class="stat go"><div class="n">&mdash;</div><div class="l">Go</div></div>
      <div class="stat"><div class="n">&mdash;</div><div class="l">Skip</div></div>
      <div class="stat"><div class="n">&mdash;</div><div class="l">Pending</div></div>
    </div>

    <div class="table-head">
      <div>Fair</div>
      <div>Dates</div>
      <div>Venue</div>
      <div>Status</div>
    </div>

    <div id="rows">
      <div class="loading">Fetching data/fairs.json&hellip;</div>
    </div>

    <footer>
      Data refreshed daily from Expolume. Decisions are reviewed and set manually in <code>data/decisions.json</code>.
    </footer>
  </div>

<script>
const MONTH_NAMES = ["January","February","March","April","May","June","July","August","September","October","November","December"];

async function loadJSON(path) {
  try {
    const res = await fetch(path, { cache: "no-store" });
    if (!res.ok) return null;
    return await res.json();
  } catch (e) {
    return null;
  }
}

function fmtUpdated(iso) {
  if (!iso) return "Not yet run";
  const d = new Date(iso);
  return "Last updated " + d.toLocaleString(undefined, {
    day: "numeric", month: "short", year: "numeric", hour: "2-digit", minute: "2-digit"
  });
}

function decisionFor(decisions, fair) {
  if (!decisions) return null;
  return decisions[fair.url] || decisions[fair.name] || null;
}

function badgeHTML(decision) {
  if (!decision || !decision.decision) {
    return '<span class="badge pending">Pending review</span>';
  }
  const val = decision.decision.toLowerCase();
  const cls = val === "go" ? "go" : val === "skip" ? "skip" : "maybe";
  const label = val === "go" ? "Go" : val === "skip" ? "Skip" : "Maybe";
  return '<span class="badge ' + cls + '">' + label + '</span>' +
         (decision.note ? '<div class="note">' + escapeHTML(decision.note) + '</div>' : '');
}

function escapeHTML(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

async function init() {
  const [fairsData, decisions] = await Promise.all([
    loadJSON('data/fairs.json'),
    loadJSON('data/decisions.json')
  ]);

  const rowsEl = document.getElementById('rows');
  const summaryEl = document.getElementById('summary');

  if (!fairsData) {
    rowsEl.innerHTML = '<div class="empty">Could not load data/fairs.json. Has the daily workflow run yet?</div>';
    return;
  }

  // Month header
  if (fairsData.target_month) {
    const [y, m] = fairsData.target_month.split('-');
    document.getElementById('monthNum').textContent = m;
    document.getElementById('monthTitle').textContent = MONTH_NAMES[parseInt(m, 10) - 1] + ' ' + y;
  } else {
    document.getElementById('monthTitle').textContent = 'China Trade Fair Radar';
  }
  document.getElementById('updatedAt').textContent = fmtUpdated(fairsData.last_updated);

  const fairs = fairsData.fairs || [];

  // Summary counts
  let go = 0, skip = 0, pending = 0;
  fairs.forEach(f => {
    const d = decisionFor(decisions, f);
    const val = d && d.decision ? d.decision.toLowerCase() : null;
    if (val === 'go') go++;
    else if (val === 'skip') skip++;
    else pending++;
  });

  summaryEl.innerHTML = `
    <div class="stat"><div class="n">${fairs.length}</div><div class="l">Found</div></div>
    <div class="stat go"><div class="n">${go}</div><div class="l">Go</div></div>
    <div class="stat"><div class="n">${skip}</div><div class="l">Skip</div></div>
    <div class="stat"><div class="n">${pending}</div><div class="l">Pending</div></div>
  `;

  if (fairs.length === 0) {
    rowsEl.innerHTML = '<div class="empty">No China fairs found for this month yet.</div>';
    return;
  }

  rowsEl.innerHTML = fairs.map(f => {
    const d = decisionFor(decisions, f);
    return `
      <div class="row">
        <a class="fair-name" href="${f.url || '#'}" target="_blank" rel="noopener">
          ${escapeHTML(f.name || 'Untitled fair')} <span class="arrow">&#8599;</span>
        </a>
        <div class="dates">${escapeHTML(f.dates || '&mdash;')}</div>
        <div class="venue">${escapeHTML(f.venue || '&mdash;')}</div>
        <div>${badgeHTML(d)}</div>
      </div>
    `;
  }).join('');
}

init();
</script>
</body>
</html>
